<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/styles.css">
  <title>NFT Preview Card | Equilibrium #3429</title>
</head>
<body>
  <main>
    <article class="card" role="article">
      <div class="card__image">
        <img src="./images/image-equilibrium.jpg" alt="Equilibrium #3429 NFT artwork">
        <div class="card__overlay">
          <img src="./images/icon-view.svg" alt="" aria-hidden="true" class="card__eye-icon">
        </div>
      </div>
      <div class="card__content">
        <h1 class="card__title">Equilibrium #3429</h1>
        <p class="card__description">Our Equilibrium collection promotes balance and calm.</p>
        <div class="card__info">
          <div class="card__price">
            <img src="./images/icon-ethereum.svg" alt="" aria-hidden="true" class="card__icon">
            <span>0.041 ETH</span>
          </div>
          <div class="card__time">
            <img src="./images/icon-clock.svg" alt="" aria-hidden="true" class="card__icon">
            <span>3 days left</span>
          </div>
        </div>
      </div>
      <hr class="card__divider" aria-hidden="true">
      <div class="card__creator">
        <img src="./images/image-avatar.png" alt="Jules Wyvern's avatar" class="card__avatar">
        <p class="card__creator-text">Creation of <span class="card__creator-name">Jules Wyvern</span></p>
      </div>
    </article>
  </main>
  <script src="script.js"></script>
</body>
</html>
